# fly.ner.toml — same Fly app as fly.toml, but builds and deploys the
# NER variant of the image (Dockerfile.platform-ner). Use this config
# whenever you want to deploy the hugot-enabled backend over the existing
# anonde-platform app.
#
# Workflow:
#   fly deploy --config fly.toml       # patterns-only (~12 MB)
#   fly deploy --config fly.ner.toml   # hugot NER baked in (~275 MB)
#
# Verify which variant is live after each deploy:
#   fly logs -a anonde-platform | grep "analyzer backend:"
#   # → "patterns-only (no NER)"  OR  "hugot (model=...)"
#
# Both configs target the same app and same URL — anonde-platform.fly.dev
# — so the second deploy fully replaces the first. In-memory vault/store
# is cleared on each redeploy, so tokens issued under one variant cannot
# be revealed after switching.
#
# Cold-start strategy: WARMUP_ON_START=1 forces the Hugot ONNX session to
# load at boot, before the HTTP server begins listening. This moves the
# model-load cost (and any OOM under-provisioning) out of the first user
# request and into the boot phase, where Fly's machine logs make it
# visible. The healthcheck grace_period is set to 60s — Fly clamps any
# value > 60s to 60s, so longer values silently lie. If warmup takes
# longer than 60s on your machine class, expect the first healthcheck
# attempt to fail and Fly to retry; if warmup consistently exceeds 60s
# (e.g. on shared-cpu-1x@256MB), scale memory/CPU rather than tune the
# grace.
#
# Idle behaviour: auto_stop_machines = "suspend" (not "stop") with
# min_machines_running = 0 — the machine sleeps after idle but its RAM is
# snapshotted. Wake-from-suspend is ~1–3 s and crucially the ONNX session
# stays loaded, so the next request skips the 5–30 s warmup. The in-memory
# vault also survives suspend, so tokens minted before the idle window can
# still be revealed after wake. Fly may occasionally evict a suspended
# machine for host maintenance, in which case the next request gets a
# full cold start with warmup; this is rare but not zero.

app = "anonde-platform"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile.platform-ner"

[env]
  WARMUP_ON_START = "1"
  # Cap warmup time so if the machine is under-provisioned the process
  # exits fatally instead of stalling past the 60s healthcheck grace.
  # On shared-cpu-1x@1024MB the Isotonic distilbert ONNX session
  # typically initialises in 10–30 s.
  PLATFORM_WARMUP_TIMEOUT = "50s"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 100
    soft_limit = 25

  [[http_service.checks]]
    interval = "10s"
    timeout = "5s"
    grace_period = "60s"
    method = "GET"
    path = "/healthz"
    protocol = "http"
    tls_skip_verify = false
