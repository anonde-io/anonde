# anonde local stack — pick a profile that matches the image variant you want.
#
#   docker compose --profile patterns  up    # ~12 MB,    patterns only, text/JSON only
#   docker compose --profile ner       up    # ~1.13 GB,  GLiNER base + PDF + metrics
#
# Profiles are mutually exclusive: only one runs per `docker compose up`.
# Both publish the API on the host port set by ANONDE_PORT (default 8081).
# The NER profiles additionally expose Prometheus on the host port set by
# METRICS_PORT (default 9090) — scrape http://localhost:9090/metrics.
#
# Persistence
# -----------
# Each service mounts a named volume at /var/lib/anonde, the single anchor
# every shipped image points at via ENV ANONDE_DATA_DIR. The volume holds:
#   - telemetry install_id (stable across restarts; otherwise the dashboard
#     sees each restart as a brand-new install)
#   - the bbolt vault DB when STORE_BACKEND=bbolt (otherwise the in-memory
#     vault resets on restart by design — no data lives in the volume).
# Switch backends with `-e STORE_BACKEND=bbolt -e ANONDE_VAULT_KEY=...`.
# GLiNER + YOLOS model weights are baked into the NER image variants; they
# are NOT in this volume.

name: anonde

services:
  anonde-patterns:
    profiles: ["patterns"]
    build:
      context: .
      dockerfile: Dockerfile.anonde
    image: anonde:patterns
    ports:
      - "${ANONDE_PORT:-8081}:8080"
    environment:
      ANALYZER_BACKEND: patterns
    volumes:
      - anonde-data-patterns:/var/lib/anonde
    restart: unless-stopped

  anonde-ner:
    profiles: ["ner"]
    build:
      context: .
      dockerfile: Dockerfile.anonde-ner
    image: anonde:ner
    ports:
      - "${ANONDE_PORT:-8081}:8080"
      - "${METRICS_PORT:-9090}:9090"
    environment:
      ANALYZER_BACKEND: gliner
      ANONDE_PDF_ENABLED: "1"
      METRICS_BIND: "0.0.0.0:9090"
    volumes:
      - anonde-data-ner:/var/lib/anonde
    restart: unless-stopped

volumes:
  # Per-profile named volumes so switching profiles doesn't cross-pollinate
  # state (the install_id especially — sharing it across variants would make
  # the dashboard report a single install switching backend repeatedly).
  anonde-data-patterns:
  anonde-data-ner:
