name: anonde-local

services:
  anonde:
    build:
      context: .
      dockerfile: Dockerfile.anonde
    image: anonde:local
    ports:
      - "${ANONDE_PORT:-8082}:8080"
    environment:
      ANONDE_ADDR: ":8080"
      ANALYZER_BACKEND: "${ANALYZER_BACKEND:-hugot}"
      HUGOT_MODEL: "${HUGOT_MODEL:-Isotonic/distilbert_finetuned_ai4privacy_v2}"
      HUGOT_MODELS_DIR: "/models"
    volumes:
      - hugot_models:/models
    networks:
      - local_data_plane
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    profiles:
      - ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - local_data_plane
    restart: unless-stopped

  # Optional production-oriented primitives for moving beyond in-memory stubs.
  vault-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vault
      POSTGRES_USER: vault
      POSTGRES_PASSWORD: vault_local_only
    volumes:
      - vault_db_data:/var/lib/postgresql/data
    networks:
      - local_data_plane
    restart: unless-stopped

  policy:
    image: openpolicyagent/opa:latest-static
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
    ports:
      - "8181:8181"
    networks:
      - local_data_plane
    restart: unless-stopped

networks:
  local_data_plane:
    driver: bridge

volumes:
  hugot_models:
  ollama_data:
  vault_db_data:
