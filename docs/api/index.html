<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>anonde API</title>
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5.18.2/swagger-ui.css">
  <style>
    body { margin: 0; background: #fafafa; }
    .topbar { display: none; }
  </style>
</head>
<body>
  <div id="swagger-ui"></div>
  <script src="https://unpkg.com/swagger-ui-dist@5.18.2/swagger-ui-bundle.js"></script>
  <script>
    // Loads the generated OpenAPI v2 spec emitted by
    // protoc-gen-openapiv2 (see buf.gen.yaml). The relative path keeps
    // this file self-contained — open it locally, or serve docs/api/
    // as static files, or point at the raw URL on github.com.
    window.ui = SwaggerUIBundle({
      url: "../../gen/anonde/v1/anonde.swagger.json",
      dom_id: "#swagger-ui",
      deepLinking: true,
      defaultModelsExpandDepth: 0,
      docExpansion: "list",
    });
  </script>
</body>
</html>
