# Python sidecar GLiNER PII output (see bench/runners/gliner.py).
# Already canonicalised at runner level; pass-through with anonde-style
# entity types. Listed explicitly so compare.py finds the section.
gliner-py:
  PERSON: PERSON
  LOCATION: LOCATION
  ORGANIZATION: ORGANIZATION
  ADDRESS: ADDRESS
  STREET_ADDRESS: ADDRESS
  POSTAL_CODE: ADDRESS
  DATE_TIME: DATE
  PHONE_NUMBER: PHONE
  EMAIL_ADDRESS: EMAIL
  URL: URL
  CREDIT_CARD: ID
  IBAN_CODE: IBAN
  US_SSN: ID
  ID: ID
  AGE: AGE
  PROFESSION: PROFESSION

# OpenAI Privacy Filter sidecar output (see bench/runners/openai_pf.py).
openai-pf:
  PERSON: PERSON
  ADDRESS: ADDRESS
  EMAIL_ADDRESS: EMAIL
  PHONE_NUMBER: PHONE
  URL: URL
  DATE_TIME: DATE
  ID: ID

# jdkato/prose v2 NER labels (see bench-go-lib/prose/runner.go for the
# raw->canonical mapping prose's runner already applies before emitting).
# Listed explicitly so compare.py uses this section instead of falling back
# to OTHER.
prose:
  PERSON: PERSON
  LOCATION: LOCATION
  ORGANIZATION: ORGANIZATION
  NRP: ~                       # NRP is anonde-internal, not load-bearing here

# go-ego/gse + dictionary baseline (see bench-go-lib/gse/runner.go).
# Only PERSON is emitted; we map to canonical PERSON.
gse:
  PERSON: PERSON

