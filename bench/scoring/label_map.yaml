# Label normalisation for the GraSCCo recall bench.
# Maps each engine's raw entity types to a shared canonical vocabulary.
# Set a value to `~` (null) to drop those spans from scoring (e.g.
# honorifics that aren't standalone PHI).

canonical:
  - PERSON
  - LOCATION
  - ORGANIZATION
  - DATE
  - AGE
  - PHONE
  - EMAIL
  - URL
  - ID
  - IBAN
  - ADDRESS
  - PROFESSION

# Per-entity severity weights for the **severity-weighted leak rate**.
# A leaked SSN is not equivalent to a leaked city name; compliance
# teams already think in tiers. Defaults follow a 1 / 5 / 10 scale:
#
#   10 — irrecoverable harm if leaked: account/financial/medical IDs.
#    5 — direct identifier: name, contact info, street-level address,
#        date-of-birth-ish dates.
#    1 — quasi-identifier or contextual: city-level location, org,
#        general date, age band, profession, generic URL.
#    0 — drop from the weighted leak metric entirely (informational).
#
# The raw (unweighted) leak rate still reports alongside; the weighted
# rate is an additional column, not a replacement. Override by
# editing this section — the renderer reads it at run time.
severity:
  PERSON: 5
  LOCATION: 1
  ORGANIZATION: 1
  DATE: 5            # DOB-class dates dominate; if your corpus is appointment-dates, lower to 1
  AGE: 1
  PHONE: 5
  EMAIL: 5
  URL: 1
  ID: 10
  IBAN: 10
  ADDRESS: 5
  PROFESSION: 1
  OTHER: 0           # chemicals, drug mentions etc — not PHI

# Gold-side label mapping. Covers GraSCCo (GeMTeX DeID layer) plus the
# standard NER vocabularies used by CoNLL-2003, GermEval-14, WNUT-17,
# WikiAnn, and the synthetic corpora.
gold:
  # Canonical identity entries — the new academic corpora emit canonical
  # type names directly (PERSON/LOCATION/ORGANIZATION) so the gold side
  # is a no-op pass-through. We list them explicitly so `_normalize` finds
  # them in the map instead of routing through OTHER.
  PERSON: PERSON
  LOCATION: LOCATION
  ORGANIZATION: ORGANIZATION
  DATE: DATE
  AGE: AGE
  PHONE: PHONE
  EMAIL: EMAIL
  URL: URL
  ID: ID
  IBAN: IBAN
  ADDRESS: ADDRESS
  PROFESSION: PROFESSION
  # PharmaCoNER (chemical / drug) — not PHI; drop from scoring so
  # anonde's correct non-flag of chemical strings doesn't count as a
  # false negative. Falls precision-probe-only.
  OTHER: ~

  # Secret tokens — API keys, JWTs, bearer/session tokens, OAuth client
  # secrets. Emitted by the synth_logs corpus (Phase 3 of the
  # multilingual bench expansion). anonde ships NO secret recognizer
  # yet, so `~` drops these gold spans from scoring: that gives a fair
  # PII-only leak number today rather than penalising anonde for a
  # capability it was never built to have. The spans STAY in the gold
  # JSONL — when a secret recognizer lands, a future phase scores them
  # by changing this one line (e.g. `SECRET: ID` or adding SECRET to the
  # `canonical:` list above). See bench/corpora/synth_logs/README.md.
  SECRET: ~

  # GraSCCo PHI labels (GeMTeX DeID layer 'kind' values).
  NAME_PATIENT: PERSON
  NAME_DOCTOR: PERSON
  NAME_RELATIVE: PERSON
  NAME_TITLE: ~              # honorifics — not PHI on their own
  NAME_USERNAME: ID
  NAME_EXT: PERSON
  NAME: PERSON

  LOCATION_HOSPITAL: ORGANIZATION
  LOCATION_ORGANIZATION: ORGANIZATION
  LOCATION_CITY: LOCATION
  LOCATION_STATE: LOCATION
  LOCATION_COUNTRY: LOCATION
  LOCATION_STREET: ADDRESS
  LOCATION_ZIP: ADDRESS
  LOCATION_OTHER: LOCATION
  LOCATION: LOCATION

  DATE: DATE
  DATE_BIRTH: DATE

  AGE: AGE

  CONTACT_PHONE: PHONE
  CONTACT_FAX: PHONE
  CONTACT_EMAIL: EMAIL
  CONTACT_URL: URL
  CONTACT_IP: ID

  ID: ID
  ID_SSN: ID
  ID_MRN: ID
  ID_INSURANCE: ID
  ID_DEVICE: ID
  ID_VEHICLE: ID
  ID_BIOID: ID
  ID_IDNUM: ID

  PROFESSION: PROFESSION

  # ai4privacy structured-PII gold. The ai4privacy_* loader
  # (bench/corpora/ai4privacy_en/cmd/fetch_pii_masking.py) emits
  # anonde/Presidio-style entity types directly into gold. Without these
  # entries the structured-PII types collapse to OTHER (severity 0) and
  # drop out of scoring entirely — under-counting both recall and leak
  # rate on every ai4privacy corpus. Mapped to the existing canonical
  # vocabulary; covers every type the loader's LABEL_MAP can emit.
  EMAIL_ADDRESS: EMAIL
  PHONE_NUMBER: PHONE
  DATE_TIME: DATE
  IP_ADDRESS: ID
  MAC_ADDRESS: ID
  CREDIT_CARD: ID
  US_SSN: ID
  CRYPTO: ID
  IBAN_CODE: IBAN

  # ----------------------------------------------------------------
  # MAPA legal/administrative gold (Phase 2 of the multilingual bench
  # expansion). Dataset: joelniklaus/mapa (CC-BY-4.0) — the EU-funded
  # Multilingual Anonymisation for Public Administration corpus. The
  # shared loader (bench/corpora/mapa_en/cmd/fetch_mapa.py) emits the
  # five mapa_{en,de,es,fr,it} corpora.
  #
  # MAPA ships a TWO-LEVEL annotation: a coarse layer and a fine layer.
  # The loader builds gold from the COARSE layer — the fine layer is
  # NOT a clean leaf decomposition of it (no GIVEN NAME label exists;
  # ~25% of coarse-entity tokens are fine==O; fine sub-mentions cut
  # across coarse spans). See the loader docstring for the full probe.
  #
  # Because the loader maps MAPA's coarse types to canonical anonde
  # type strings BEFORE writing gold, the entries actually consumed by
  # compare.py are the canonical ones already listed above (PERSON,
  # ORGANIZATION, ADDRESS, DATE_TIME). The block below documents the
  # FULL MAPA label vocabulary (coarse + fine) and is the audit trail
  # for the loader's COARSE_MAP — and a forward-compatible hook if the
  # loader is ever switched to emit raw MAPA labels.
  #
  # MAPA coarse layer (the layer gold is built from):
  MAPA_PERSON: PERSON
  MAPA_ORGANISATION: ORGANIZATION   # EU/BrE spelling
  MAPA_ADDRESS: ADDRESS
  MAPA_DATE: DATE
  # AMOUNT — monetary value. anonde's rule: monetary amounts are NOT
  # PII. Dropped from gold so a correct non-flag is not a false
  # negative and a leaked amount is not counted. The loader does not
  # even emit it; the `~` here documents the decision.
  MAPA_AMOUNT: ~
  #
  # MAPA fine layer (informational — NOT emitted into gold; see above).
  # Listed so the full upstream vocabulary is documented in one place.
  # Name parts → PERSON (note: MAPA has NO "given name" label — given
  # names are coarse PERSON but fine O):
  MAPA_FAMILY_NAME: PERSON
  MAPA_INITIAL_NAME: PERSON
  MAPA_TITLE: PERSON              # honorific bound to a name
  MAPA_ROLE: ~                   # job role token — not a direct identifier
  MAPA_PROFESSION: PROFESSION
  MAPA_NATIONALITY: ~            # NRP-class; no canonical type, drop
  MAPA_ETHNIC_CATEGORY: ~        # NRP-class; sensitive but no canonical type
  MAPA_MARITAL_STATUS: ~         # quasi-identifier; no canonical type
  MAPA_AGE: AGE
  # Address / location sub-labels:
  MAPA_CITY: LOCATION
  MAPA_COUNTRY: LOCATION
  MAPA_TERRITORY: LOCATION
  MAPA_PLACE: LOCATION
  MAPA_BUILDING: ADDRESS
  # Date sub-labels — day/month/year parts of a coarse DATE span:
  MAPA_DAY: DATE
  MAPA_MONTH: DATE
  MAPA_YEAR: DATE
  # Contact:
  MAPA_URL: URL
  # AMOUNT sub-labels — monetary value/unit, not PII (same rule as
  # MAPA_AMOUNT above):
  MAPA_VALUE: ~
  MAPA_UNIT: ~
  # Misc fine labels with no PII meaning:
  MAPA_TYPE: ~                   # document/entity type token
  MAPA_STANDARD_ABBREVIATION: ~  # legal-citation abbreviation

  # ----------------------------------------------------------------
  # MEDDOCAN PHI gold (Phase 4 of the multilingual bench expansion).
  # Dataset: MEDDOCAN (Medical Document Anonymization, IberLEF 2019
  # shared task) — 1,000 expert-annotated Spanish clinical case reports,
  # CC-BY-4.0, Zenodo record 4279323. The real-gold Spanish clinical
  # de-id corpus; loader at bench/corpora/meddocan_es/loader.py.
  #
  # Like the mapa_* loader, meddocan_es/loader.py maps MEDDOCAN's 22 PHI
  # labels to the canonical anonde type strings BEFORE writing gold — so
  # the entries actually consumed by compare.py are the canonical ones
  # already listed at the top of this gold: section (PERSON, LOCATION,
  # ADDRESS, ORGANIZATION, DATE, AGE, ID, PHONE, EMAIL, PROFESSION). The
  # block below is the AUDIT TRAIL for the loader's LABEL_MAP — and a
  # forward-compatible hook if the loader is ever switched to emit raw
  # MEDDOCAN labels. The two `~` labels are dropped (no canonical PHI
  # type); see the loader docstring for the rationale.
  MEDDOCAN_NOMBRE_SUJETO_ASISTENCIA: PERSON         # patient name
  MEDDOCAN_NOMBRE_PERSONAL_SANITARIO: PERSON        # clinician name
  MEDDOCAN_FAMILIARES_SUJETO_ASISTENCIA: PERSON     # named relative
  MEDDOCAN_CALLE: ADDRESS                           # street address
  MEDDOCAN_TERRITORIO: LOCATION                     # city / region / postcode
  MEDDOCAN_PAIS: LOCATION                           # country
  MEDDOCAN_HOSPITAL: ORGANIZATION
  MEDDOCAN_INSTITUCION: ORGANIZATION
  MEDDOCAN_CENTRO_SALUD: ORGANIZATION               # health centre
  MEDDOCAN_FECHAS: DATE
  MEDDOCAN_EDAD_SUJETO_ASISTENCIA: AGE
  MEDDOCAN_ID_SUJETO_ASISTENCIA: ID                 # patient record number
  MEDDOCAN_ID_TITULACION_PERSONAL_SANITARIO: ID     # clinician licence id
  MEDDOCAN_ID_ASEGURAMIENTO: ID                     # insurance id
  MEDDOCAN_ID_CONTACTO_ASISTENCIAL: ID              # care-contact id
  MEDDOCAN_ID_EMPLEO_PERSONAL_SANITARIO: ID         # clinician employment id
  MEDDOCAN_NUMERO_TELEFONO: PHONE
  MEDDOCAN_NUMERO_FAX: PHONE
  MEDDOCAN_CORREO_ELECTRONICO: EMAIL
  MEDDOCAN_PROFESION: PROFESSION
  MEDDOCAN_SEXO_SUJETO_ASISTENCIA: ~   # gender — NRP-class, no canonical type
  MEDDOCAN_OTROS_SUJETO_ASISTENCIA: ~  # catch-all "other PHI" — no single type

