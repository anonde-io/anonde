name: bench-full

# Full anonde bench matrix — every engine × every corpus, parallelised.
#
# The serial version (commit cecc3ca) hit the 120-min timeout on
# free-tier ubuntu-latest because ai4privacy_en × gliner-py and the
# long-clinical corpora (pmc_de, wiki_de) dominated wall-clock. This
# version uses GitHub Actions matrix strategy to fan out per-corpus:
# each corpus runs on its own runner in parallel, and a final render
# job stitches the results together.
#
# Distinct from .github/workflows/bench.yml (per-push regression
# catcher, openmed + synth_clinical × 3 engines, ~10-15 min) and
# bench-history.yml (release-tag snapshot, same subset + commit-back).
#
# This is the only workflow that runs the openai-pf engine: it sets
# RUN_OPENAI_PF=1, so each cell scores the OpenAI Privacy Filter model on
# a deterministic subsample (OPENAI_PF_SAMPLE docs, ~80 s/doc on CPU).
# openai-pf is too slow for the per-push bench (bench.yml), which leaves
# it excluded. See bench/Makefile's ENGINES block for the gating design.
#
# It also runs the anonde-gliner-fp32 engine — the same GLiNER PII model
# as the production anonde-gliner but loaded from the FP32 ONNX instead
# of INT8, a permanent matrix column tracking the quantization tradeoff.
# Like openai-pf it is kept off the per-push corpus-X target (bench.yml
# stays lean); the full matrix pulls it in via `make gliner-fp32-X`.
#
# A third anonde GLiNER column — anonde-gliner-large — runs the larger
# sibling model (knowledgator/gliner-pii-large-v1.0, ~3-4x parameters)
# at FP32, probing whether scale closes the remaining Romance-language
# cells where production FP32 still loses to a baseline. Same gating
# pattern as fp32 (full matrix only, via `make gliner-large-X`).
#
# The eight engines per corpus: anonde-patterns, anonde-gliner (INT8
# legacy), anonde-gliner-fp32 (FP32, production), anonde-gliner-large
# (FP32, larger model — flat decoder), anonde-gliner-stack (FP32 BASE +
# LARGE flat in one engine), gliner-py, presidio, openai-pf.
#
# Triggers:
#   * Weekly Sundays at 06:00 UTC (≈07:00 Berlin, ≈01:00 NY).
#   * Manual workflow_dispatch.
#
# Wall-clock: cells run in parallel (one runner per corpus), so the
# whole matrix completes in roughly the time of the slowest cell. The
# openai-pf engine is the long pole — at ~80 s/doc on a 40-doc subsample
# its cell runs ~53 min, which is why bench-cell's timeout is 75 min.
# Cells without openai-pf finish far sooner.
#
# Corpora skipped from the CI matrix:
#   * pmc_de / wiki_de — no gold spans (precision-probe only); F1 +
#     leak rate are not measurable, so no CI value vs the runner cost.
#   * conll2003_de — LDC-gated; loader exits 2 cleanly. Skipping the
#     cell avoids a noisy "exit code 2" red mark in the matrix UI.
#   * ggponc_de — requires manual DUA registration.
#
# meddocan_es (real-gold Spanish clinical de-id, Phase 4) IS in the
# matrix. MEDDOCAN is openly licensed (CC-BY-4.0, Zenodo); its loader
# network-fetches the archive and, like conll2003_de, exits 2 cleanly if
# Zenodo is unreachable — a transient failure shows the cell as missing
# rather than reddening the matrix (fail-fast: false, tolerant renderer).
#
# Cost: each cell ~5-30 min × 30 cells × 4 runs/month ≈ 3000 min/month.
# The 30 cells break down as:
#   11  Phase 0 baseline — openmed, synth_clinical, finance_de, legal_de,
#       wikiann_de, germeval_14, adversarial_de, ai4privacy_en,
#       conll2003_en, wnut_17, pharmaconer_es
#    4  ai4privacy de/fr/it/es splits           (Phase 1)
#    5  MAPA en/de/es/fr/it legal splits        (Phase 2)
#    5  synth_finance en/de/es/fr/it            (Phase 3)
#    1  synth_logs                              (Phase 3)
#    4  synth_clinical en/fr/it + meddocan_es   (Phase 4)
# Free-tier limit for public repos is unlimited; for private repos the
# 2000 min/month free quota covers this.

on:
  schedule:
    - cron: '0 6 * * 0'
  workflow_dispatch:
    inputs:
      label:
        description: 'Optional artifact-label override (default: weekly-<date> or dispatch-<sha>)'
        required: false
        default: ''

# Do NOT cancel an in-progress full bench — losing a 40-min run to a
# non-bench push is worse than running two in series.
concurrency:
  group: bench-full-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ---- Per-cell bench. One runner per corpus, in parallel. ----------
  bench-cell:
    name: cell · ${{ matrix.corpus }}
    runs-on: ubicloud-standard-2
    # 75 min (was 45): the openai-pf cell is now part of the full matrix
    # and runs ~80 s/doc on CPU. We score it on a deterministic
    # OPENAI_PF_SAMPLE-doc subsample (40 → ~53 min) rather than the whole
    # corpus; 75 min leaves headroom for that plus the four always-on
    # engines on the same runner. Tradeoff considered: a smaller CI-only
    # OPENAI_PF_SAMPLE would keep the 45-min cap, but 40 docs is already
    # the floor for a stable leak-rate estimate, so we bump the timeout
    # instead of shrinking the sample.
    timeout-minutes: 75
    strategy:
      # Don't abort sibling cells when one fails — partial results are
      # still useful and the render job is tolerant of missing cells.
      fail-fast: false
      matrix:
        corpus:
          # German — gold-bearing only. pmc_de + wiki_de are
          # precision-probe (no gold), excluded from CI matrix.
          - openmed
          - synth_clinical
          - finance_de
          - legal_de
          - wikiann_de
          - germeval_14
          - adversarial_de
          # English
          - ai4privacy_en
          - conll2003_en
          - wnut_17
          # Spanish
          - pharmaconer_es
          # Finance — synthetic (Phase 3).
          # synth_finance_{en,de,es,fr,it} — synthetic financial
          # documents (invoices, bank statements, KYC/onboarding,
          # transaction confirmations). One shared slot-based generator
          # (bench/corpora/synth_finance_en/), sliced by language. Gold
          # by construction; MOD-97-valid IBANs + Luhn-valid cards.
          - synth_finance_en
          - synth_finance_de
          - synth_finance_es
          - synth_finance_fr
          - synth_finance_it
          # Enterprise logs — synthetic (Phase 3).
          # synth_logs — synthetic auth/error/access/audit log
          # excerpts. English scaffolding, PII sampled across
          # EN/DE/ES/FR/IT. Secret tokens are gold-tagged SECRET and
          # dropped from scoring (label_map: SECRET ~) — anonde ships
          # no secret recognizer yet. See its README.
          - synth_logs
          # Clinical — Phase 4.
          # synth_clinical_{en,fr,it} — synthetic clinical documents
          # (ED triage, OP report, radiology, rehab discharge). One
          # shared slot-based generator (canonical home:
          # bench/corpora/synth_clinical/, which is itself the German
          # regression-anchor corpus in bench.yml), sliced by language.
          # Gold by construction. meddocan_es is the real-gold Spanish
          # clinical de-id corpus — it network-fetches from Zenodo and
          # exits 2 cleanly if unreachable (cell shows as missing).
          - synth_clinical_en
          - synth_clinical_fr
          - synth_clinical_it
          - meddocan_es
          # General PII — ai4privacy multilingual splits (Phase 1).
          # Same dataset + loader + gold schema as ai4privacy_en, sliced
          # by language. Gives the matrix a cross-language EN/DE/FR/IT/ES
          # general-PII number. ai4privacy/pii-masking-300k covers six
          # languages (en/fr/de/it/es/nl); en/de/fr/it/es are wired here.
          - ai4privacy_de
          - ai4privacy_fr
          - ai4privacy_it
          - ai4privacy_es
          # Legal — MAPA multilingual (Phase 2).
          # joelniklaus/mapa — the EU-funded Multilingual Anonymisation
          # for Public Administration corpus (legal / administrative
          # text). One shared loader sliced by language; gold built from
          # MAPA's coarse annotation layer. Gives the matrix a real-gold
          # legal domain number in EN/DE/ES/FR/IT.
          - mapa_en
          - mapa_de
          - mapa_es
          - mapa_fr
          - mapa_it

    env:
      ORT_VERSION: "1.26.0"
      ORT_LIB_DIR: ${{ github.workspace }}/.tokenlib
      ORT_LIB: ${{ github.workspace }}/.tokenlib/libonnxruntime.so
      # CI cap for ai4privacy_en (other corpora ignore this variable).
      # 5000 docs is overkill for a regression bench; 1000 keeps the
      # cell under 10 min while staying statistically representative.
      MAX_DOCS: "1000"
      SPACY_MODEL: en_core_web_lg

    steps:
      - uses: actions/checkout@v4

      # Free disk on the ~14 GB runner before the cell pulls its heavy
      # assets. The cell stacks: openai/privacy-filter (~2.8 GB), the
      # GLiNER PII ONNX exports (INT8 model_quint8.onnx + FP32 model.onnx
      # for the base + the larger gliner-pii-large-v1.0 FP32 export), a
      # spaCy model (~750 MB), and TWO Python venvs (bench base + the
      # isolated openai-pf venv). Both venvs install CPU-only torch (the
      # PyTorch CPU wheel index — see bench/requirements*.txt), which
      # already removes the multi-GB CUDA stack that previously overflowed
      # the disk; dropping the preinstalled Android SDK / .NET / Haskell
      # toolchains is cheap belt-and-suspenders headroom on top of that.
      - name: Free disk space
        run: |
          set -euo pipefail
          df -h /
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc \
            /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" || true
          df -h /

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache-dependency-path: go.sum

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: bench/requirements.txt

      - name: Cache libonnxruntime
        id: ort-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.ORT_LIB_DIR }}
          key: libonnxruntime-${{ env.ORT_VERSION }}-linux-x64

      - name: Download libonnxruntime
        if: steps.ort-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p "$ORT_LIB_DIR"
          curl -fsSL \
            "https://github.com/microsoft/onnxruntime/releases/download/v${ORT_VERSION}/onnxruntime-linux-x64-${ORT_VERSION}.tgz" \
            -o /tmp/ort.tgz
          tar -xzf /tmp/ort.tgz -C /tmp
          cp "/tmp/onnxruntime-linux-x64-${ORT_VERSION}/lib/libonnxruntime.so.${ORT_VERSION}" \
             "$ORT_LIB_DIR/libonnxruntime.so"

      - name: Install Python deps (bench base)
        run: |
          python -m pip install --upgrade pip
          pip install -r bench/requirements.txt

      # Presidio + spaCy. Now runs on every cell — Presidio is
      # multilingual via the spaCy model picked per corpus. Each runner
      # downloads only the model its corpus needs (en/de/es) to avoid
      # the unnecessary ~750 MB download on a non-EN cell.
      - name: Install Presidio + spaCy
        run: |
          set -euo pipefail
          pip install presidio-analyzer spacy

      - name: Download spaCy model for this cell's language
        run: |
          set -euo pipefail
          case "${{ matrix.corpus }}" in
            ai4privacy_en|conll2003_en|wnut_17|mapa_en|synth_finance_en|synth_logs|synth_clinical_en)
              python -m spacy download en_core_web_lg ;;
            pharmaconer_es|ai4privacy_es|mapa_es|synth_finance_es|meddocan_es)
              python -m spacy download es_core_news_lg ;;
            ai4privacy_fr|mapa_fr|synth_finance_fr|synth_clinical_fr)
              python -m spacy download fr_core_news_lg ;;
            ai4privacy_it|mapa_it|synth_finance_it|synth_clinical_it)
              python -m spacy download it_core_news_lg ;;
            openmed|pmc_de|synth_clinical|wiki_de|finance_de|legal_de|wikiann_de|germeval_14|conll2003_de|adversarial_de|ai4privacy_de|mapa_de|synth_finance_de)
              python -m spacy download de_core_news_lg ;;
            *)
              echo "no spaCy model mapping for corpus '${{ matrix.corpus }}'; skipping" ;;
          esac

      # Cache the GLiNER PII model assets. Three artifacts the matrix
      # uses share these dirs: model_quint8.onnx (INT8, anonde-gliner) +
      # model.onnx (FP32, anonde-gliner-fp32) — both from
      # knowledgator/gliner-pii-base-v1.0 — and the larger sibling
      # knowledgator/gliner-pii-large-v1.0 (FP32, anonde-gliner-large).
      # The cache PATH already covers all three; the `-int8-fp32-large`
      # key suffix forces one cache refresh so a cache populated before
      # the large column existed (base-only) does not make every cell
      # re-download the large model.
      - name: Cache HuggingFace model cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-cache-gliner-pii-base-v1.0-int8-fp32-large

      - name: Cache anonde model cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/anonde/models
          key: anonde-models-gliner-pii-base-v1.0-int8-fp32-large

      # Cache key includes the recognizer + bench-runner source as well
      # as the corpus loader, because the cached path contains BOTH the
      # gold corpus.jsonl AND the per-cell prediction JSONLs. Restoring
      # stale predictions after a recognizer change would silently make
      # the bench report meaningless. Glob `analyzer/recognizers/*.go`
      # catches both the GLiNER recognizer + its config; test files are
      # harmless to include (rarely change in ways that affect output).
      # The bench/runners/anonde.go path covers changes to the bench
      # runner itself.
      #
      # Bumping the cache key by editing any of these files forces a
      # full rebuild of the corpus's gold + every cell. The HF + spaCy +
      # libonnxruntime caches are unaffected (separate keys).
      - name: Cache corpus data
        uses: actions/cache@v4
        with:
          path: bench/corpora/${{ matrix.corpus }}/data
          key: corpus-${{ matrix.corpus }}-${{ hashFiles(format('bench/corpora/{0}/loader.py', matrix.corpus), format('bench/corpora/{0}/generate.py', matrix.corpus), 'analyzer/recognizers/*.go', 'analyzer/recognizers/gliner_config.go', 'bench/runners/anonde.go') }}-maxdocs${{ env.MAX_DOCS }}

      - name: Verify hugot build (the bench needs it)
        run: |
          CGO_ENABLED=1 go build -tags hugot ./...

      # Run the four always-on engines (corpus-X), then the
      # anonde-gliner-fp32 cell, then the anonde-gliner-large cell, then
      # the openai-pf cell. The FP32, LARGE, and openai-pf cells are all
      # kept off the per-push `corpus-X` target so bench.yml stays lean;
      # the full matrix pulls them in explicitly here (gliner-fp32-X /
      # gliner-large-X / openai-pf-X). openai-pf is additionally gated
      # behind RUN_OPENAI_PF=1 — set here (and only here / on the
      # `matrix` target) so the slow ~80 s/doc model runs on the weekly
      # full matrix but never on the per-push PR bench. The openai-pf
      # cell is scored on a deterministic OPENAI_PF_SAMPLE-doc subsample;
      # render_matrix.py scores it over only the docs it returned. The
      # FP32 + LARGE cells are fast in-process Go runs (no gate needed).
      - name: Run cell — ${{ matrix.corpus }}
        env:
          ORT_LIB: ${{ env.ORT_LIB }}
        run: |
          set -euo pipefail
          make -C bench corpus-${{ matrix.corpus }} PYTHON=python3
          make -C bench gliner-fp32-${{ matrix.corpus }} PYTHON=python3
          make -C bench gliner-large-${{ matrix.corpus }} PYTHON=python3
          make -C bench gliner-stack-${{ matrix.corpus }} PYTHON=python3
          make -C bench openai-pf-${{ matrix.corpus }} PYTHON=python3 RUN_OPENAI_PF=1

      # Upload the cell's data dir as an artifact. The render job will
      # download every cell-* artifact and reassemble bench/corpora/.
      - name: Upload cell artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cell-${{ matrix.corpus }}
          path: bench/corpora/${{ matrix.corpus }}/data/*.jsonl
          retention-days: 14

  # ---- Aggregate the matrix into a single REPORT. -------------------
  render:
    name: render REPORT_MATRIX
    needs: bench-cell
    # Render even if some cells failed — render_matrix is tolerant of
    # missing per-cell JSONLs (they show as "–" in the matrix UI).
    if: always()
    runs-on: ubicloud-standard-2
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install minimal deps for render
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      # Pull every cell's data back into place. Each artifact is named
      # `cell-<corpus>` and contains the corpus's data/*.jsonl files;
      # we re-mount them under bench/corpora/<corpus>/data/.
      - name: Download all cell artifacts
        uses: actions/download-artifact@v4
        with:
          path: cell-outputs
          pattern: cell-*

      - name: Stitch cell outputs back into bench/corpora/
        run: |
          set -euo pipefail
          if [ ! -d cell-outputs ]; then
            echo "no cell-outputs/ — every matrix cell must have failed before upload"
            exit 1
          fi
          for d in cell-outputs/cell-*; do
            [ -d "$d" ] || continue
            name=$(basename "$d" | sed 's/^cell-//')
            mkdir -p "bench/corpora/$name/data"
            cp "$d"/*.jsonl "bench/corpora/$name/data/" 2>/dev/null || \
              echo "  (cell $name had no JSONL output — will render as missing)"
          done
          echo "Reassembled cells:"
          ls -1 bench/corpora/*/data/*.jsonl 2>/dev/null | sed 's/^/  /' || \
            echo "  (none — every cell produced no output)"

      # `make render` invokes bench/scoring/render_matrix.py, which groups
      # the report by domain → language. The (domain, language) of each
      # corpus comes from bench/scoring/corpora.yaml; the renderer resolves
      # that file by default (it sits beside the script), so no extra flag
      # is needed here. A corpus missing from corpora.yaml still renders —
      # under an 'uncategorized' group, with a stderr warning.
      - name: Render REPORT_MATRIX (grouped by domain × language)
        run: |
          make -C bench render PYTHON=python3

      # Same canary as the per-push bench, but walks every gold-bearing
      # corpus and checks ALL THREE GLiNER cells — the INT8 legacy
      # (anonde-gliner), the FP32 production (anonde-gliner-fp32), and
      # the LARGE FP32 (anonde-gliner-large). A silent fallback to
      # patterns is the highest-cost bug class, and the FP32 + LARGE
      # cells are just as exposed to it (bad ORT_LIB / missing ONNX) as
      # the legacy INT8 one.
      - name: Guard rail — GLiNER actually fired
        run: |
          python3 - <<'PYEOF'
          import json, sys
          from pathlib import Path

          failures = []
          checked = 0
          root = Path("bench/corpora")
          # The four GLiNER cells the matrix runs: INT8 legacy + FP32 +
          # the LARGE FP32 variant + the BASE+LARGE stack.
          gliner_engines = (
              "anonde-gliner",
              "anonde-gliner-fp32",
              "anonde-gliner-large",
              "anonde-gliner-stack",
          )
          for corpus_dir in sorted(root.iterdir()):
              gold = corpus_dir / "data" / "corpus.jsonl"
              if not gold.exists():
                  continue
              has_gold = False
              with gold.open() as fh:
                  for line in fh:
                      d = json.loads(line)
                      if d.get("entities"):
                          has_gold = True
                          break
              if not has_gold:
                  print(f"  {corpus_dir.name}: precision-probe corpus, skip")
                  continue
              for eng in gliner_engines:
                  pred = corpus_dir / "data" / f"anonde_{eng}.jsonl"
                  if not pred.exists():
                      # GLiNER cell simply not run for this corpus —
                      # not a fallback, just a missing cell. Skip silently.
                      continue
                  ner_like = 0
                  with pred.open() as fh:
                      for line in fh:
                          d = json.loads(line)
                          for f in d.get("findings", []):
                              s = f.get("score", 0)
                              if abs(s * 20 - round(s * 20)) > 1e-6:
                                  ner_like += 1
                  checked += 1
                  if ner_like == 0:
                      failures.append(
                          f"{corpus_dir.name} [{eng}]: 0 NER-attributable "
                          f"findings — GLiNER silently fell back to patterns"
                      )
                  else:
                      print(f"  {corpus_dir.name} [{eng}]: {ner_like} "
                            f"NER-attributable findings — OK")
          if checked == 0:
              print("Guard rail FAILED: no gold-bearing gliner cells were rendered")
              sys.exit(1)
          if failures:
              print("\nGuard rail FAILED:")
              for f in failures:
                  print("  " + f)
              sys.exit(1)
          PYEOF

      - name: Compute snapshot label
        id: label
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.label }}" ]]; then
            LABEL="${{ inputs.label }}"
          elif [[ "${{ github.event_name }}" == "schedule" ]]; then
            LABEL="weekly-$(date -u +%Y-%m-%d)"
          else
            LABEL="dispatch-$(git rev-parse --short HEAD)"
          fi
          LABEL=$(echo "$LABEL" | tr -c 'A-Za-z0-9._-' '_')
          echo "label=$LABEL" >> "$GITHUB_OUTPUT"

      - name: Upload combined report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-full-${{ steps.label.outputs.label }}
          path: |
            bench/REPORT_MATRIX.md
            bench/results_matrix.csv
            bench/corpora/*/data/anonde_*.jsonl
          retention-days: 90

      # Render the combined report into the run's job summary. The report
      # itself is grouped by domain → language (see render_matrix.py); the
      # lines below just give the run's provenance + corpus inventory.
      - name: Headline → job summary
        if: always()
        run: |
          {
            echo "## anonde bench — full matrix (parallelised)"
            echo ""
            echo "_Run: ${{ github.event_name }} · label: ${{ steps.label.outputs.label }}_"
            echo "_Engines (8): anonde-patterns, anonde-gliner-fp32 (FP32 ONNX, production), anonde-gliner (INT8 — legacy / memory-constrained reference), anonde-gliner-large (FP32, larger model — flat decoder), anonde-gliner-stack (FP32 BASE + LARGE flat stacked), gliner-py, presidio, openai-pf (subsampled — 40 docs/corpus)_"
            echo "_Corpora in matrix: 30, across 6 domains × 5 languages._"
            echo "_New since Phase 0: ai4privacy de/fr/it/es (Phase 1) · MAPA en/de/es/fr/it legal (Phase 2) · synth_finance en/de/es/fr/it + synth_logs (Phase 3) · synth_clinical en/fr/it + meddocan_es (Phase 4)._"
            echo "_Excluded from the matrix: pmc_de / wiki_de (precision-probe, no gold), conll2003_de (loader-gated), ggponc_de (DUA registration)._"
            echo ""
            if [ -f bench/REPORT_MATRIX.md ]; then
              cat bench/REPORT_MATRIX.md
            else
              echo "_(REPORT_MATRIX.md not produced — see logs above)_"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
