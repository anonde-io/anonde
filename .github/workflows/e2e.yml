name: e2e

# Merge-gate end-to-end test for the anonde HTTP service.
#
# Boots the real cmd/anonde binary (patterns backend, no CGO) on random
# loopback ports, drives every REST endpoint, asserts both response
# shapes AND that /metrics counters incremented as expected. The
# observability layer is what makes this a "real" merge gate vs. a
# pure functional test — a handler that silently no-ops still 200s,
# but the metrics scrape catches that.
#
# Patterns-only by design: the e2e tier must run on every PR without
# special hardware, libonnxruntime, or tesseract. The PDF raw-bytes
# endpoint is exercised in its "not configured" (HTTP 501) state, which
# validates the opt-in error path. Full visual-PDF coverage lives in
# the (separate) stress tier.
#
# Triggers: path-filtered so doc-only PRs stay free.

on:
  push:
    branches: [main]
    paths:
      - 'analyzer/**'
      - 'anonde.go'
      - 'anonymizer/**'
      - 'cmd/anonde/**'
      - 'e2e/**'
      - 'gen/**'
      - 'internal/**'
      - 'proto/**'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
      - '.github/workflows/e2e.yml'
  pull_request:
    paths:
      - 'analyzer/**'
      - 'anonde.go'
      - 'anonymizer/**'
      - 'cmd/anonde/**'
      - 'e2e/**'
      - 'gen/**'
      - 'internal/**'
      - 'proto/**'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
      - '.github/workflows/e2e.yml'
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build + run e2e
        run: make e2e
